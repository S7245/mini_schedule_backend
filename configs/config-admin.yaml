# 平台管理后台配置（端口 8083）
app:
  name: "mini-schedule-admin"
  env: "development"
  debug: true

server:
  port: 8083
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 30s

database:
  host: "127.0.0.1"
  port: 5432
  user: "liushan"
  password: ""
  dbname: "mini_schedule"
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m
  log_level: "warn"

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 5

jwt:
  secret: "change-me-in-production"
  expire: 24h
  refresh_expire: 168h

cors:
  allowed_origins:
    - "http://localhost:3001"

log:
  level: "debug"
  format: "text"

pagination:
  default_page_size: 20
  max_page_size: 100
