# 品牌商家后台配置（端口 8081）
app:
  name: "mini-schedule-brand"
  env: "development"
  debug: true

server:
  port: 8081
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 30s

database:
  host: "127.0.0.1"
  port: 5432
  user: "liushan"
  password: ""
  dbname: "mini_schedule"
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m
  log_level: "warn"

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 5

jwt:
  secret: "change-me-in-production"
  expire: 24h
  refresh_expire: 168h

cors:
  allowed_origins:
    - "http://localhost:3002"

log:
  level: "debug"
  format: "text"

pagination:
  default_page_size: 20
  max_page_size: 100

sms:
  provider: "mock"
  mock_code: "123456"
  allow_mock: true
  expire_minutes: 5

payment:
  wechat:
    app_id: ""
    mch_id: ""
    api_v3_key: ""
    serial_no: ""
    private_key_path: ""
    notify_url: ""
    allow_mock: true
