# C 端用户配置（端口 8082）
app:
  name: "mini-schedule-app"
  env: "development"
  debug: true

server:
  port: 8082
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 30s

database:
  host: "127.0.0.1"
  port: 5432
  user: "liushan"
  password: ""
  dbname: "mini_schedule"
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m
  log_level: "warn"
  # Batch 4.5: dev / mock 模式默认开启；生产 yaml 应改为 false，靠 env 显式开。
  auto_migrate_on_boot: true

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 5

jwt:
  secret: "change-me-in-production"
  expire: 24h
  refresh_expire: 168h

# C 端浏览器/小程序直连后端需 CORS（生产用 MINI_SCHEDULE_CORS_ALLOWED_ORIGINS 注入 Vercel 域名）。
cors:
  allowed_origins:
    - "http://localhost:3003"

log:
  level: "debug"
  format: "text"

pagination:
  default_page_size: 20
  max_page_size: 100

# Batch 15：后台 worker（asynq）。仅 cmd/worker 进程读取，复用上面的 redis 段连接。
worker:
  sweep_cron: "@every 1m"   # 场次状态扫描周期（cron / @every 语法）
  subscription_sweep_cron: "@every 1h"   # 订阅生命周期扫描周期（天级粒度，小时足够）
  concurrency: 4            # asynq Server 并发 worker 数
  grace_days: 7             # 默认宽限期天数（§1334 可系统配置；env 覆盖）
